name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version already set in package.json, for example 0.2.0"
        required: true
        type: string
      npm_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: string
      confirm_publish:
        description: "Type publish to confirm npm publish"
        required: true
        type: string
      authentication:
        description: "Publishing authentication; prefer trusted publisher after npm configuration is verified"
        required: true
        default: "trusted-publisher"
        type: choice
        options:
          - trusted-publisher
          - token-fallback

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    name: Manual npm publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.inputs.confirm_publish == 'publish' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Pin trusted-publishing npm CLI
        run: |
          npm install --global npm@11.11.0
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) throw new Error('trusted publishing requires Node 22.14.0 or later')"
          npm_version="$(npm --version)"
          node -e "const [major, minor] = process.argv[1].split('.').map(Number); if (major < 11 || (major === 11 && minor < 5)) throw new Error('trusted publishing requires npm 11.5.1 or later')" "$npm_version"

      - name: Verify package version
        shell: bash
        env:
          EXPECTED_VERSION: ${{ github.event.inputs.version }}
          NPM_TAG: ${{ github.event.inputs.npm_tag }}
        run: |
          actual="$(node -p "require('./package.json').version")"
          expected="$EXPECTED_VERSION"
          npm_tag="$NPM_TAG"
          if ! [[ "$expected" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version input must be a semver-like value, got $expected"
            exit 1
          fi
          if ! [[ "$npm_tag" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "npm_tag must contain only letters, numbers, dot, underscore, or dash"
            exit 1
          fi
          if [ "$actual" != "$expected" ]; then
            echo "package.json version is $actual, expected $expected"
            exit 1
          fi
          if [[ "$expected" == *-* && "$npm_tag" == "latest" ]]; then
            echo "Prerelease versions must not use the latest dist-tag"
            exit 1
          fi

      - name: Verify immutable release source
        shell: bash
        env:
          EXPECTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Release workflow must run from main, got $GITHUB_REF"
            exit 1
          fi
          git fetch --force origin main --tags
          head_commit="$(git rev-parse HEAD)"
          main_commit="$(git rev-parse origin/main)"
          if [ "$head_commit" != "$main_commit" ]; then
            echo "Checked out commit is not current origin/main"
            exit 1
          fi
          tag="v$EXPECTED_VERSION"
          tag_commit="$(git rev-list -n 1 "$tag" 2>/dev/null || true)"
          if [ -z "$tag_commit" ] || [ "$tag_commit" != "$head_commit" ]; then
            echo "$tag must exist and resolve to the current main commit"
            exit 1
          fi

      - name: Verify version is unpublished
        shell: bash
        env:
          EXPECTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          existing="$(npm view "aienvmap@$EXPECTED_VERSION" version 2>/dev/null || true)"
          if [ "$existing" = "$EXPECTED_VERSION" ]; then
            echo "aienvmap@$EXPECTED_VERSION is already published"
            exit 1
          fi

      - name: Release check
        run: npm run release:check

      - name: Publish to npm with trusted publisher
        if: ${{ github.event.inputs.authentication == 'trusted-publisher' }}
        run: npm publish --access public --tag "${{ github.event.inputs.npm_tag }}" --provenance

      - name: Publish to npm with explicit token fallback
        if: ${{ github.event.inputs.authentication == 'token-fallback' }}
        run: npm publish --access public --tag "${{ github.event.inputs.npm_tag }}" --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published registry metadata
        shell: bash
        env:
          EXPECTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          observed=""
          integrity=""
          for attempt in 1 2 3; do
            observed="$(npm view "aienvmap@$EXPECTED_VERSION" version 2>/dev/null || true)"
            integrity="$(npm view "aienvmap@$EXPECTED_VERSION" dist.integrity 2>/dev/null || true)"
            if [ "$observed" = "$EXPECTED_VERSION" ] && [ -n "$integrity" ]; then break; fi
            sleep 5
          done
          if [ "$observed" != "$EXPECTED_VERSION" ] || [ -z "$integrity" ]; then
            echo "Published registry metadata did not verify for aienvmap@$EXPECTED_VERSION"
            exit 1
          fi
          echo "verified aienvmap@$observed with registry integrity $integrity"
