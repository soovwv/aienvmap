name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  apm:
    name: APM package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pinned APM CLI
        run: python -m pip install apm-cli==0.25.0

      - name: Audit bounded skill
        run: apm audit --file .apm/skills/aienvmap/SKILL.md

      - name: Preview cross-tool placement
        run: apm compile --dry-run --target agent-skills,claude

  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: macos-latest
            node: 20
          - os: windows-latest
            node: 18
          - os: windows-latest
            node: 20
          - os: windows-latest
            node: 22

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - name: Test
        run: node --test

      - name: English text and UTF-8 policy
        run: npm run text:check

      - name: Smoke
        run: npm run smoke

      - name: Performance budgets
        run: npm run perf:check

      - name: Pack dry-run
        run: npm run pack:dry
