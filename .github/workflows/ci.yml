name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: macos-latest
            node: 20
          - os: windows-latest
            node: 18
          - os: windows-latest
            node: 20
          - os: windows-latest
            node: 22

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - name: Test
        run: node --test

      - name: Smoke
        run: npm run smoke

      - name: Performance budgets
        run: npm run perf:check

      - name: Pack dry-run
        run: npm run pack:dry
